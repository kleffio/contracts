// ui/manifest.proto
//
// UIManifest — plugins that contribute frontend components and navigation.
// Capability key: "ui.manifest"
syntax = "proto3";
package kleff.plugins.v1;
option go_package = "github.com/kleffio/plugin-sdk-go/v1;pluginsv1";

import "common.proto";

service UIManifestService {
  rpc GetUIManifest(GetUIManifestRequest) returns (GetUIManifestResponse);
}

message GetUIManifestRequest {}

message GetUIManifestResponse {
  oneof result {
    UIManifest manifest = 1;
    Error      error    = 2;
  }
}

message UIManifest {
  repeated NavItem       nav_items        = 1;
  repeated SettingsPage  settings_pages   = 2;
  repeated ProfileSection profile_sections = 3;
  LoginConfig            login_config     = 4;
  SignupConfig           signup_config    = 5;
  string                 bundle_url       = 6; // JS module URL for dynamic loading
  string                 plugin_id        = 7; // set by the platform after fetching
}

message NavItem {
  string href  = 1;
  string label = 2;
  string icon  = 3;
}

message SettingsPage {
  string href      = 1;
  string label     = 2;
  string slot      = 3; // component slot ID in the bundle
  string iframe_url = 4; // if set, embed as iframe
}

message ProfileSection {
  string label        = 1;
  string slot         = 2; // component slot ID in the bundle
  string id           = 3; // unique identifier for this section
  string description  = 4;
  string iframe_url   = 5; // if set, embed as iframe
  repeated string actions = 6; // native action keys (e.g. "change_password")
}

message LoginConfig {
  bool   show_form     = 1; // render username/password form
  string redirect_url  = 2; // OIDC redirect if show_form = false
  string provider_name = 3;
  string provider_logo = 4;
}

message SignupConfig {
  bool   enabled      = 1;
  string redirect_url = 2;
}
