// identity/provider.proto
//
// IdentityProvider — AuthN plugins (Keycloak, Authentik, etc.)
// Handles login, token validation, and OIDC config.
// Capability key: "identity.provider"
syntax = "proto3";
package kleff.plugins.v1;
option go_package = "github.com/kleffio/plugin-sdk-go/v1;pluginsv1";

import "common.proto";

service IdentityProvider {
  rpc Login(LoginRequest)                 returns (LoginResponse);
  rpc Register(RegisterRequest)           returns (RegisterResponse);
  rpc GetUser(GetUserRequest)             returns (GetUserResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc GetOIDCConfig(GetOIDCConfigRequest) returns (GetOIDCConfigResponse);
  rpc RefreshToken(RefreshTokenRequest)   returns (RefreshTokenResponse);
  rpc Health(HealthRequest)               returns (HealthResponse);
}

// ── Token validation ──────────────────────────────────────────────────────────

message ValidateTokenRequest  { string token = 1; }

message TokenClaims {
  string          subject  = 1;
  string          email    = 2;
  repeated string roles    = 3;
  string          username = 4;
}

message ValidateTokenResponse {
  oneof result {
    TokenClaims claims = 1;
    Error       error  = 2;
  }
}

// ── OIDC configuration ────────────────────────────────────────────────────────

message GetOIDCConfigRequest {}

message OIDCConfig {
  string          authority              = 1;
  string          client_id             = 2;
  string          jwks_uri              = 3;
  repeated string scopes                = 4;
  string          auth_mode             = 5; // "headless" or "redirect"
  string          token_endpoint        = 6;
  string          authorization_endpoint = 7;
  string          userinfo_endpoint     = 8;
  string          end_session_endpoint  = 9;
  string          internal_token_endpoint = 10; // Docker-internal URL for server-side PKCE proxy
}

message GetOIDCConfigResponse {
  oneof result {
    OIDCConfig config = 1;
    Error      error  = 2;
  }
}

// ── Token refresh ─────────────────────────────────────────────────────────────

message RefreshTokenRequest  { string refresh_token = 1; }

message RefreshTokenResponse {
  oneof result {
    TokenSet token = 1;
    Error    error = 2;
  }
}

// ── Login / Register / GetUser ────────────────────────────────────────────────

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  oneof result {
    TokenSet token = 1;
    Error    error = 2;
  }
}

message TokenSet {
  string access_token  = 1;
  string refresh_token = 2;
  string id_token      = 3;
  string token_type    = 4;
  int64  expires_in    = 5;
  string scope         = 6;
}

message RegisterRequest {
  string username   = 1;
  string email      = 2;
  string password   = 3;
  string first_name = 4;
  string last_name  = 5;
}

message RegisterResponse {
  oneof result {
    string user_id = 1;
    Error  error   = 2;
  }
}

message GetUserRequest  { string user_id = 1; }

message GetUserResponse {
  oneof result {
    UserInfo user  = 1;
    Error    error = 2;
  }
}

message UserInfo {
  string user_id    = 1;
  string email      = 2;
  string username   = 3;
  string first_name = 4;
  string last_name  = 5;
}
