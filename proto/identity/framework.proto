// identity/framework.proto
//
// IdentityFramework — full IAM platform plugins (user CRUD, roles, groups,
// sessions). A framework plugin manages identity state; a provider plugin
// only validates tokens. Capability key: "identity.framework"
syntax = "proto3";
package kleff.plugins.v1;
option go_package = "github.com/kleffio/plugin-sdk-go/v1;pluginsv1";

import "common.proto";

service IdentityFramework {
  // User lifecycle
  rpc CreateUser(CreateUserRequest)           returns (CreateUserResponse);
  rpc UpdateUser(UpdateUserRequest)           returns (UpdateUserResponse);
  rpc DeleteUser(DeleteUserRequest)           returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest)             returns (ListUsersResponse);
  rpc SearchUsers(SearchUsersRequest)         returns (SearchUsersResponse);

  // Roles
  rpc AssignRole(AssignRoleRequest)           returns (AssignRoleResponse);
  rpc RevokeRole(RevokeRoleRequest)           returns (RevokeRoleResponse);
  rpc ListRoles(ListRolesRequest)             returns (ListRolesResponse);

  // Sessions
  rpc ListSessions(ListSessionsRequest)       returns (ListSessionsResponse);
  rpc RevokeSession(RevokeSessionRequest)     returns (RevokeSessionResponse);

  // Password
  rpc ChangePassword(ChangePasswordRequest)   returns (ChangePasswordResponse);
  rpc EnsureAdmin(EnsureAdminRequest)         returns (EnsureAdminResponse);

  rpc Health(HealthRequest)                   returns (HealthResponse);
}

// ── Users ─────────────────────────────────────────────────────────────────────

message CreateUserRequest {
  string username   = 1;
  string email      = 2;
  string password   = 3;
  string first_name = 4;
  string last_name  = 5;
}

message CreateUserResponse {
  oneof result {
    string user_id = 1;
    Error  error   = 2;
  }
}

message UpdateUserRequest {
  string user_id    = 1;
  string email      = 2;
  string first_name = 3;
  string last_name  = 4;
}

message UpdateUserResponse {
  oneof result {
    bool  ok    = 1;
    Error error = 2;
  }
}

message DeleteUserRequest  { string user_id = 1; }
message DeleteUserResponse {
  oneof result {
    bool  ok    = 1;
    Error error = 2;
  }
}

message ListUsersRequest {
  int32  page      = 1;
  int32  page_size = 2;
}

message ListUsersResponse {
  oneof result {
    UserList users = 1;
    Error    error = 2;
  }
}

message UserList {
  repeated UserEntry items = 1;
  int32              total = 2;
}

message UserEntry {
  string          user_id    = 1;
  string          email      = 2;
  string          username   = 3;
  string          first_name = 4;
  string          last_name  = 5;
  repeated string roles      = 6;
}

message SearchUsersRequest  { string query = 1; int32 limit = 2; }
message SearchUsersResponse {
  oneof result {
    UserList users = 1;
    Error    error = 2;
  }
}

// ── Roles ─────────────────────────────────────────────────────────────────────

message AssignRoleRequest  { string user_id = 1; string role = 2; }
message AssignRoleResponse {
  oneof result {
    bool  ok    = 1;
    Error error = 2;
  }
}

message RevokeRoleRequest  { string user_id = 1; string role = 2; }
message RevokeRoleResponse {
  oneof result {
    bool  ok    = 1;
    Error error = 2;
  }
}

message ListRolesRequest  {}
message ListRolesResponse {
  oneof result {
    RoleList roles = 1;
    Error    error = 2;
  }
}

message RoleList { repeated string roles = 1; }

// ── Sessions ──────────────────────────────────────────────────────────────────

message ListSessionsRequest {
  string user_id            = 1;
  string current_session_id = 2; // hint for marking the active session
}

message ListSessionsResponse {
  oneof result {
    SessionList sessions = 1;
    Error       error    = 2;
  }
}

message SessionList { repeated Session items = 1; }

message Session {
  string id          = 1;
  string user_id     = 2;
  string ip_address  = 3;
  string user_agent  = 4;
  int64  created_at  = 5;
  int64  expires_at  = 6;
  int64  last_access = 7;
  bool   current     = 8;
}

message RevokeSessionRequest {
  string session_id = 1;
  string user_id    = 2;
}

message RevokeSessionResponse {
  oneof result {
    bool  ok    = 1;
    Error error = 2;
  }
}

// ── Password / Admin ──────────────────────────────────────────────────────────

message ChangePasswordRequest {
  string user_id          = 1;
  string current_password = 2;
  string new_password     = 3;
}

message ChangePasswordResponse {
  oneof result {
    bool  ok    = 1;
    Error error = 2;
  }
}

message EnsureAdminRequest {
  string username = 1;
  string email    = 2;
  string password = 3;
}

message EnsureAdminResponse {
  oneof result {
    string user_id = 1;
    Error  error   = 2;
  }
}
