// api/routes.proto
//
// APIRoutes — plugins that own HTTP route namespaces under /api/v1/p/{plugin}.
// Capability key: "api.routes"
syntax = "proto3";
package kleff.plugins.v1;
option go_package = "github.com/kleffio/contracts/proto/api";

import "common.proto";

service APIRoutes {
  // Called once at plugin registration to declare owned routes.
  rpc GetRoutes(GetRoutesRequest) returns (GetRoutesResponse);

  // Called for every matched request.
  rpc Handle(HandleRequest) returns (HandleResponse);
}

message GetRoutesRequest {}

message GetRoutesResponse {
  oneof result {
    RouteList routes = 1;
    Error     error  = 2;
  }
}

message RouteList { repeated Route items = 1; }

message Route {
  string method  = 1; // "GET", "POST", etc. — "*" for any
  string pattern = 2; // e.g. "/users/{id}"
}

message HandleRequest {
  string method                   = 1;
  string path                     = 2;
  map<string, string> headers     = 3;
  bytes  body                     = 4;
  map<string, string> path_params = 5;
  string user_id                  = 6;
  repeated string roles           = 7;
}

message HandleResponse {
  int32  status                   = 1;
  map<string, string> headers     = 2;
  bytes  body                     = 3;
}
